name: Wails Windows Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 to fix warnings

      - name: Setup Go
        uses: actions/setup-go@v5 # Updated to v5
        with:
          go-version: '1.25.5' 

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: 22

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App (Windows)
        run: wails build -clean -m 

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2 # Updated to v2
        with:
          files: build/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}