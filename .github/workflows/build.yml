name: Wails Build

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        # Building for all 3 major operating systems
        os: [windows-latest, macos-latest, ubuntu-latest]
        
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.5' # Locked to your exact local Go version

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22 # Locked to your exact local Node major version

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev gcc-aarch64-linux-gnu

      - name: Build Wails App
        run: wails build -clean -m 

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}